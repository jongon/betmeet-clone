pre-commit:
  parallel: true
  commands:
    biome:
      glob: "*.{js,jsx,ts,tsx,json,jsonc}"
      run: pnpm biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true
    agent-config:
      glob: ".agent/**"
      run: bash scripts/setup-agent.sh && git diff --exit-code .claude/settings.json .opencode/opencode.json
      fail_text: "Drift detectado entre .agent/ y los configs generados. Haz commit de los cambios en .claude/settings.json y .opencode/opencode.json."

commit-msg:
  commands:
    commitlint:
      run: pnpm commitlint --edit {1}
