# Supabase local config.
#
# Enfocado en el wiring de plantillas de email de auth (Unit 9 / FR-EMAIL-01):
# las plantillas se versionan en `supabase/templates/*.html` y Supabase las carga
# vía `content_path`. El emisor en prod/staging es Resend, configurado como Custom
# SMTP (ver bloque [auth.email.smtp] más abajo y el dashboard de Supabase).
#
# Si necesitas el config.toml completo del proyecto, ejecuta `supabase init` y
# fusiona estos bloques.
project_id = "liga-mundial"

[auth]
# URL del sitio usada para construir enlaces de los correos (coincide con NEXT_PUBLIC_SITE_URL).
site_url = "env(NEXT_PUBLIC_SITE_URL)"

[auth.email]
# Confirmaciones de email obligatorias para registro (sin esto, Supabase entrega
# sesión sin confirmar y el gate en src/proxy.ts no tendría qué exigir — FR-REFINE-15.14).
enable_confirmations = true
# "Secure email change": cuando está activo, el cambio de correo exige confirmar
# desde la dirección actual Y la nueva. FR-REFINE-19.1 lo desactiva: el cambio se
# confirma con UN solo enlace enviado únicamente al correo NUEVO, y la notificación
# de cambio llega solo al nuevo (no al antiguo). Tradeoff de seguridad aceptado por
# el usuario (CF-9). Debe coincidir con el toggle del dashboard en prod.
secure_email_change_enabled = false

# Confirmar email al registro. Trigger: src/features/auth/actions/sign-up.ts
[auth.email.template.confirmation]
subject = "Confirma tu cuenta — Quiniela Mundial 2026"
content_path = "./supabase/templates/confirmation.html"

# Restablecer contraseña. Trigger: src/features/auth/actions/forgot-password.ts
[auth.email.template.recovery]
subject = "Restablece tu contraseña — Quiniela Mundial 2026"
content_path = "./supabase/templates/recovery.html"

# Confirmar cambio de email (con Secure email change desactivado, se envía un
# único enlace a la dirección NUEVA — FR-REFINE-19.1).
# Trigger: src/features/auth/actions/change-email.ts
[auth.email.template.email_change]
subject = "Confirma el cambio de tu email — Quiniela Mundial 2026"
content_path = "./supabase/templates/email_change.html"

# --- SMTP (Resend) ---------------------------------------------------------
# El emisor real. En dev puede omitirse (Supabase usa su emisor de pruebas) o
# usar el sandbox de Resend. En prod requiere un dominio verificado en Resend
# (DKIM/SPF/DMARC). Configura los secretos en el dashboard o como env() aquí;
# NO hardcodear credenciales.
#
# [auth.email.smtp]
# host = "smtp.resend.com"
# port = 465
# user = "resend"
# pass = "env(RESEND_SMTP_PASSWORD)"   # API key de Resend
# admin_email = "env(EMAIL_FROM)"
# sender_name = "Quiniela Mundial 2026"
