name: nextjs-app
services:
  devcontainer:
    container_name: nextjs-devcontainer
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
      target: devcontainer
    image: nextjs/code
    volumes:
      - '.:/var/www/html'
      - 'node-home:/home/node'
    networks:
      - nextjs
    extra_hosts:
      - 'host.docker.internal:host-gateway'

  app:
    container_name: nextjs-app
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
      target: app
    image: nextjs/app
    ports:
      - '${APP_PORT:-3000}:3000'
      - '${DEBUG_PORT:-9229}:9229'
    environment:
      NODE_ENV: development
      DATABASE_URL: 'postgresql://${DB_USERNAME:-username}:${DB_PASSWORD:-password}@postgres:5432/${DB_DATABASE:-nextjs}'
    volumes:
      - .:/var/www/html
    depends_on:
      postgres:
        condition: service_healthy
      pnpm:
        condition: service_completed_successfully
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000']
      interval: 5s
      timeout: 20s
      retries: 10
    restart: on-failure
    networks:
      - nextjs

  postgres:
    container_name: nextjs-postgres
    image: postgres:18-alpine
    ports:
      - '${FORWARD_DB_PORT:-5432}:5432'
    environment:
      POSTGRES_DB: '${DB_DATABASE:-nextjs}'
      POSTGRES_USER: '${DB_USERNAME:-username}'
      POSTGRES_PASSWORD: '${DB_PASSWORD:-password}'
    volumes:
      - 'nextjs-postgres:/var/lib/postgresql'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME:-username}']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: on-failure
    networks:
      - nextjs

  pgadmin:
    container_name: nextjs-pgadmin
    image: dpage/pgadmin4
    ports:
      - '8082:80'
    environment:
      PGADMIN_DEFAULT_EMAIL: 'admin@nextjs.dev'
      PGADMIN_DEFAULT_PASSWORD: 'password'
    depends_on:
      - postgres
    volumes:
      - 'pgadmin-data:/var/lib/pgadmin'
    restart: on-failure
    networks:
      - nextjs

  pnpm:
    container_name: nextjs-pnpm
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
      target: pnpm
    image: nextjs/pnpm
    volumes:
      - .:/var/www/html
    networks:
      - nextjs

  mailpit:
    container_name: nextjs-mailpit
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - '${MAILPIT_WEB_PORT:-8025}:8025'
      - '${MAILPIT_SMTP_PORT:-1025}:1025'
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: '1'
      MP_SMTP_AUTH_ALLOW_INSECURE: '1'
    networks:
      - nextjs

networks:
  nextjs:
    driver: bridge

volumes:
  nextjs-postgres:
    driver: local
  node-home:
    driver: local
  pgadmin-data:
    driver: local